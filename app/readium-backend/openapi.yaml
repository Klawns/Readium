openapi: 3.0.3
info:
  title: Readium Backend API
  version: 1.0.0
servers:
  - url: /api
paths:
  /books:
    get:
      summary: List books
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            default: 12
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/BookStatus'
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: integer
            format: int64
        - in: query
          name: collectionId
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Paginated books
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookPage'
    post:
      summary: Upload book
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Uploaded book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'

  /books/{bookId}:
    get:
      summary: Get book by id
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'

  /books/status:
    patch:
      summary: Update book status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookStatusRequest'
      responses:
        '204':
          description: Updated

  /books/{bookId}/progress:
    patch:
      summary: Update read progress
      parameters:
        - $ref: '#/components/parameters/BookId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
      responses:
        '204':
          description: Updated

  /books/{bookId}/file:
    get:
      summary: Download file
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Book file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /books/{bookId}/cover:
    get:
      summary: Get cover
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Cover image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  /books/{bookId}/ocr:
    post:
      summary: Queue OCR job
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '202':
          description: OCR job queued

  /books/{bookId}/ocr-status:
    get:
      summary: Get OCR status
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: OCR status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookOcrStatus'

  /books/{bookId}/text-layer-quality:
    get:
      summary: Get text layer quality
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Text layer quality score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookTextLayerQuality'

  /books/insights/metrics:
    get:
      summary: Get personal reading metrics
      responses:
        '200':
          description: Reading metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookMetrics'

  /books/insights/smart-collections:
    get:
      summary: List smart collections
      responses:
        '200':
          description: Smart collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SmartCollection'

  /books/insights/recommendations:
    get:
      summary: List book recommendations
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: Recommended books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookRecommendation'

  /books/{bookId}/annotations:
    get:
      summary: List annotations by book
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Annotation'

  /annotations/book/{bookId}/page/{page}:
    get:
      summary: List annotations by book and page
      parameters:
        - $ref: '#/components/parameters/BookId'
        - in: path
          name: page
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Annotation'

  /annotations:
    post:
      summary: Create annotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnnotationRequest'
      responses:
        '201':
          description: Annotation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'

  /annotations/{id}:
    put:
      summary: Update annotation
      parameters:
        - $ref: '#/components/parameters/AnnotationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAnnotationRequest'
      responses:
        '200':
          description: Annotation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
    delete:
      summary: Delete annotation
      parameters:
        - $ref: '#/components/parameters/AnnotationId'
      responses:
        '204':
          description: Annotation deleted

  /books/{bookId}/translations:
    get:
      summary: List translations by book
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Translations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Translation'

  /translations:
    post:
      summary: Persist translation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTranslationRequest'
      responses:
        '201':
          description: Translation created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Translation'

  /translations/auto:
    post:
      summary: Auto-translate text through backend provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoTranslationRequest'
      responses:
        '200':
          description: Auto-translation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoTranslationResponse'

  /categories:
    get:
      summary: List categories
      parameters:
        - in: query
          name: query
          schema:
            type: string
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'

  /categories/{id}:
    patch:
      summary: Update category
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
    delete:
      summary: Delete category
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '204':
          description: Category deleted

  /categories/{id}/move:
    patch:
      summary: Move category in hierarchy
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveCategoryRequest'
      responses:
        '200':
          description: Category moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'

  /books/{bookId}/categories:
    get:
      summary: List categories assigned to book
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Book categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /collections:
    get:
      summary: List reading collections
      parameters:
        - in: query
          name: query
          schema:
            type: string
      responses:
        '200':
          description: Collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReadingCollection'
    post:
      summary: Create reading collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReadingCollectionRequest'
      responses:
        '201':
          description: Collection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingCollection'

  /collections/{id}:
    patch:
      summary: Update reading collection
      parameters:
        - $ref: '#/components/parameters/CollectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReadingCollectionRequest'
      responses:
        '200':
          description: Collection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingCollection'
    delete:
      summary: Delete reading collection
      parameters:
        - $ref: '#/components/parameters/CollectionId'
      responses:
        '204':
          description: Collection deleted

  /books/{bookId}/collections:
    get:
      summary: List collections assigned to book
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Book collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReadingCollection'
    put:
      summary: Replace collections assigned to book
      parameters:
        - $ref: '#/components/parameters/BookId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookCollectionsRequest'
      responses:
        '200':
          description: Updated collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReadingCollection'
    put:
      summary: Replace categories assigned to book
      parameters:
        - $ref: '#/components/parameters/BookId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookCategoriesRequest'
      responses:
        '200':
          description: Updated categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

components:
  parameters:
    BookId:
      in: path
      name: bookId
      required: true
      schema:
        type: integer
        format: int64
    AnnotationId:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
    CategoryId:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
    CollectionId:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    BookStatus:
      type: string
      enum: [TO_READ, READING, READ]
    BookFormat:
      type: string
      enum: [PDF, EPUB]
    Book:
      type: object
      required: [id, title, format, status]
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
          nullable: true
        pages:
          type: integer
          nullable: true
        format:
          $ref: '#/components/schemas/BookFormat'
        status:
          $ref: '#/components/schemas/BookStatus'
        coverUrl:
          type: string
          nullable: true
        lastReadPage:
          type: integer
          nullable: true
    BookPage:
      type: object
      required: [content, totalPages, totalElements, size, number, first, last, empty]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Book'
        totalPages:
          type: integer
        totalElements:
          type: integer
        size:
          type: integer
        number:
          type: integer
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean
    BookMetrics:
      type: object
      required:
        - totalBooks
        - toReadBooks
        - readingBooks
        - readBooks
        - categorizedBooks
        - uncategorizedBooks
        - totalPagesKnown
        - pagesRead
        - averageProgressPercent
        - completionPercent
      properties:
        totalBooks:
          type: integer
          format: int64
        toReadBooks:
          type: integer
          format: int64
        readingBooks:
          type: integer
          format: int64
        readBooks:
          type: integer
          format: int64
        categorizedBooks:
          type: integer
          format: int64
        uncategorizedBooks:
          type: integer
          format: int64
        totalPagesKnown:
          type: integer
          format: int64
        pagesRead:
          type: integer
          format: int64
        averageProgressPercent:
          type: integer
        completionPercent:
          type: integer
    SmartCollection:
      type: object
      required: [id, name, description, totalBooks, previewBooks]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        totalBooks:
          type: integer
          format: int64
        previewBooks:
          type: array
          items:
            $ref: '#/components/schemas/Book'
    BookRecommendation:
      type: object
      required: [book, reason, score]
      properties:
        book:
          $ref: '#/components/schemas/Book'
        reason:
          type: string
        score:
          type: number
    UpdateBookStatusRequest:
      type: object
      required: [bookId, status]
      properties:
        bookId:
          type: integer
        status:
          $ref: '#/components/schemas/BookStatus'
    UpdateProgressRequest:
      type: object
      required: [page]
      properties:
        page:
          type: integer
          minimum: 0
    ReaderRect:
      type: object
      required: [x, y, width, height]
      properties:
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
    Annotation:
      type: object
      required: [id, bookId, page, rects, color, selectedText]
      properties:
        id:
          type: integer
        bookId:
          type: integer
        page:
          type: integer
        rects:
          type: array
          items:
            $ref: '#/components/schemas/ReaderRect'
        color:
          type: string
        selectedText:
          type: string
        note:
          type: string
          nullable: true
    CreateAnnotationRequest:
      type: object
      required: [bookId, page, rects, color, selectedText]
      properties:
        bookId:
          type: integer
        page:
          type: integer
        rects:
          type: array
          items:
            $ref: '#/components/schemas/ReaderRect'
        color:
          type: string
        selectedText:
          type: string
        note:
          type: string
          nullable: true
    UpdateAnnotationRequest:
      type: object
      properties:
        color:
          type: string
        note:
          type: string
          nullable: true
    Translation:
      type: object
      required: [id, originalText, translatedText]
      properties:
        id:
          type: integer
        bookId:
          type: integer
          nullable: true
        originalText:
          type: string
        translatedText:
          type: string
        contextSentence:
          type: string
          nullable: true
    CreateTranslationRequest:
      type: object
      required: [bookId, originalText, translatedText]
      properties:
        bookId:
          type: integer
        originalText:
          type: string
        translatedText:
          type: string
        contextSentence:
          type: string
          nullable: true
    AutoTranslationRequest:
      type: object
      required: [text, targetLanguage]
      properties:
        text:
          type: string
        targetLanguage:
          type: string
    AutoTranslationResponse:
      type: object
      required: [translatedText, detectedLanguage]
      properties:
        translatedText:
          type: string
        detectedLanguage:
          type: string
    BookOcrStatus:
      type: object
      required: [bookId, status]
      properties:
        bookId:
          type: integer
        status:
          type: string
          enum: [PENDING, RUNNING, DONE, FAILED]
        score:
          type: number
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    BookTextLayerQuality:
      type: object
      required: [bookId, status]
      properties:
        bookId:
          type: integer
        score:
          type: number
          nullable: true
        status:
          type: string
          enum: [PENDING, RUNNING, DONE, FAILED]
        updatedAt:
          type: string
          format: date-time
          nullable: true
    Category:
      type: object
      required: [id, name, slug, color, sortOrder, booksCount]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
        color:
          type: string
        parentId:
          type: integer
          format: int64
          nullable: true
        sortOrder:
          type: integer
        booksCount:
          type: integer
          format: int64
    ReadingCollection:
      type: object
      required: [id, name, slug, color, icon, booksCount]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
        icon:
          type: string
        booksCount:
          type: integer
          format: int64
    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        color:
          type: string
          pattern: "^#([A-Fa-f0-9]{6})$"
        parentId:
          type: integer
          format: int64
          nullable: true
    UpdateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        color:
          type: string
          pattern: "^#([A-Fa-f0-9]{6})$"
        parentId:
          type: integer
          format: int64
          nullable: true
    MoveCategoryRequest:
      type: object
      properties:
        parentId:
          type: integer
          format: int64
          nullable: true
    UpdateBookCategoriesRequest:
      type: object
      required: [categoryIds]
      properties:
        categoryIds:
          type: array
          items:
            type: integer
            format: int64
    CreateReadingCollectionRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          pattern: "^#([A-Fa-f0-9]{6})$"
        icon:
          type: string
    UpdateReadingCollectionRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          pattern: "^#([A-Fa-f0-9]{6})$"
        icon:
          type: string
    UpdateBookCollectionsRequest:
      type: object
      required: [collectionIds]
      properties:
        collectionIds:
          type: array
          items:
            type: integer
            format: int64
