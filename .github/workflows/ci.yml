name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Make mvnw executable
        working-directory: app/readium-backend
        run: chmod +x ./mvnw
      - name: Run backend tests
        working-directory: app/readium-backend
        run: ./mvnw test

  frontend:
    needs: backend-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install web dependencies
        working-directory: app/readium-frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: app/readium-frontend
        run: npm run test -- --run
      - name: Build frontend bundle
        working-directory: app/readium-frontend
        run: npm run build

  mobile-android:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install mobile dependencies
        working-directory: app/readium-frontend
        run: npm ci
      - name: Sync Android assets
        working-directory: app/readium-frontend
        run: npm run cap:sync:android
