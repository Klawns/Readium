name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Make mvnw executable
        working-directory: app/readium-backend
        run: chmod +x ./mvnw
      - name: Run backend tests
        working-directory: app/readium-backend
        run: ./mvnw test

  frontend:
    needs: backend-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/readium-frontend/package-lock.json
      - name: Install web dependencies
        working-directory: app/readium-frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: app/readium-frontend
        run: npm run test -- --run
      - name: Build frontend bundle
        working-directory: app/readium-frontend
        run: npm run build

  mobile-android:
    needs: frontend
    runs-on: ubuntu-latest
    env:
      MOBILE_API_BASE_URL: ${{ secrets.VITE_MOBILE_API_BASE_URL || secrets.VITE_API_BASE_URL || secrets.VITE_API_URL || '/api' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/readium-frontend/package-lock.json
      - name: Install mobile dependencies
        working-directory: app/readium-frontend
        run: npm ci
      - name: Create .env.mobile
        working-directory: app/readium-frontend
        run: |
          cat > .env.mobile <<EOF
          VITE_MOBILE_API_BASE_URL=${MOBILE_API_BASE_URL}
          VITE_API_BASE_URL=${MOBILE_API_BASE_URL}
          EOF
      - name: Sync Android assets
        working-directory: app/readium-frontend
        run: npm run cap:sync:android
      - name: Build Android debug APK
        working-directory: app/readium-frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

