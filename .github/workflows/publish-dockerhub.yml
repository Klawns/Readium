name: Publish Docker Hub Images

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  DOCKER_IMAGE: klawns/readium

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:base
          target: runtime-base
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base,ignore-error=true

      - name: Build and push OCR image
        uses: docker/build-push-action@v5
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:ocr
          target: runtime-ocr
          cache-from: type=gha,scope=ocr
          cache-to: type=gha,mode=max,scope=ocr,ignore-error=true
