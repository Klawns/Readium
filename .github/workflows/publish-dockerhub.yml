name: Publish Docker Hub Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  DOCKER_IMAGE: klawns/readium

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:base
          target: runtime-base
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base
      - name: Build and push OCR image
        uses: docker/build-push-action@v5
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:ocr
          target: runtime-ocr
          cache-from: type=gha,scope=ocr
          cache-to: type=gha,mode=max,scope=ocr
